<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Landing Pro - 3D Wave Interaction</title>
    <script type="text/javascript">
      // This is a redirect for GitHub Pages client-side routing
      // When a user tries to access a route that doesn't exist as a static file,
      // GitHub Pages will serve this 404.html file instead.
      // We then redirect to the index.html with the original path preserved.
      
      var pathSegmentsToKeep = 1; // Keep '/3D' in the path
      
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
